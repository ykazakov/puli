name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: [ '8', '11', '17', '21', '25' ]

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 3

    - name: Set up JDK ${{ matrix.java-version }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'temurin'
        cache: 'maven'

    - name: Build with Maven
      run: mvn install -DskipTests=true -U -B

    - name: Test with Maven
      run: mvn test -Dassembly.skipAssembly=true -B

    - name: Deploy
      if: ${{ matrix.java-version == '8' && github.ref == 'refs/heads/main' && github.event_name == 'push' }}
      run: mvn source:jar deploy --settings .ci-settings.xml -DskipTests=true -B
      env:
        DEPLOY: 1
